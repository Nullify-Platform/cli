openapi: 3.0.3
info:
  title: Nullify API
  version: 1.0.0
  description: Nullify REST API for enterprise tenants. All requests require a service-account bearer token.
servers:
  - url: https://api.<TENANT>.nullify.ai
    description: Your single-tenant Nullify API endpoint
tags: []
paths:
  /admin/assessments/scan-coverage:
    get:
      description: Returns scan coverage data per repository for a given scanner type
      parameters:
        - description: Scanner type
          in: query
          name: type
          required: true
          schema:
            description: Scanner type
            enum:
              - sast
              - sca_dependencies
              - sca_containers
              - secrets
            type: string
        - description: Max repos per page (default 50)
          in: query
          name: limit
          schema:
            description: Max repos per page (default 50)
            nullable: true
            type: integer
        - description: Pagination offset (default 0)
          in: query
          name: offset
          schema:
            description: Pagination offset (default 0)
            nullable: true
            type: integer
        - description: Case-insensitive substring filter on repository name or owner
          in: query
          name: search
          schema:
            description: Case-insensitive substring filter on repository name or owner
            nullable: true
            type: string
        - description: The Azure organization ID
          in: query
          name: azureOrganizationId
          schema:
            description: The Azure organization ID
            type: string
        - description: The Bitbucket workspace ID
          in: query
          name: bitbucketWorkspaceId
          schema:
            description: The Bitbucket workspace ID
            type: string
        - description: The Github owner ID
          in: query
          name: githubOwnerId
          schema:
            description: The Github owner ID
            format: int64
            type: integer
        - description: The GitLab group ID
          in: query
          name: gitlabGroupId
          schema:
            description: The GitLab group ID
            format: int64
            type: integer
        - description: The Nullify installation ID
          in: query
          name: installationId
          schema:
            description: The Nullify installation ID
            type: string
        - description: Filter by Azure repository IDs
          in: query
          name: azureRepositoryId
          schema:
            description: Filter by Azure repository IDs
            items:
              type: string
            type: array
        - description: Filter by GitHub repository IDs
          in: query
          name: githubRepositoryId
          schema:
            description: Filter by GitHub repository IDs
            items:
              format: int64
              type: integer
            type: array
        - description: Filter by GitHub team ID
          in: query
          name: githubTeamId
          schema:
            description: Filter by GitHub team ID
            format: int64
            type: integer
        - description: Filter by Bitbucket repository IDs
          in: query
          name: bitbucketRepositoryId
          schema:
            description: Filter by Bitbucket repository IDs
            items:
              type: string
            type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointsGetScanCoverageOutput'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrResponse'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrResponse'
          description: Unauthorized
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrResponse'
          description: Internal Server Error
      summary: Get Scan Coverage
  /admin/assessments/scan-coverage/findings:
    get:
      description: Returns individual findings for a repository in the scan coverage context
      parameters:
        - description: Scanner type
          in: query
          name: type
          required: true
          schema:
            description: Scanner type
            enum:
              - sast
              - sca_dependencies
              - sca_containers
