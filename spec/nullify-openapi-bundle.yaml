  /auth/access_token:
    GET:
      description: Exchange a one time code from cognito for a pair of access and refresh tokens
      parameters:
        - description: OAuth2 authorization code from identity provider
          in: query
          name: code
          required: true
          schema:
            type: string
        - description: Redirect URI used in the OAuth flow
          in: query
          name: redirect_uri
          required: true
          schema:
            type: string
        - description: >-
            RFC 7636 PKCE verifier paired with the code_challenge sent on the authorize request. Required when the
            original authorize request set a code_challenge; otherwise omit.
          in: query
          name: code_verifier
          required: false
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  expiresAt:
                    description: Token expiration timestamp in milliseconds
                    format: int64
                    type: integer
                  expiresIn:
                    description: Token expiration time in seconds
                    type: integer
                  installationIds:
                    description: List of GitHub installation IDs
                    items:
                      type: string
                    type: array
                required:
                  - expiresIn
                  - installationIds
                  - expiresAt
                type: object
          description: Successful token exchange
        '400':
          content:
            application/json:
              schema:
                properties:
                  error:
                    description: Error message
                    type: string
                required:
                  - error
                type: object
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                properties:
                  error:
                    description: Error message
                    type: string
                required:
                  - error
                type: object
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                properties:
                  error:
                    description: Error message
                    type: string
                required:
                  - error
                type: object
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                properties:
                  error:
                    description: Error message
                    type: string
                required:
                  - error
                type: object
          description: Internal Server Error
      summary: Get Tokens
